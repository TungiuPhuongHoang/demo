<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Image Upload Checker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: white;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    .upload-box {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 150px;
      border: 2px dashed #9aa4b2;
      border-radius: 14px;
      padding: 30px;
      text-align: center;
      background: #fafafa;
      cursor: pointer;
      transition: 0.2s;
    }

    .upload-box:hover {
      border-color: #222;
      background: #f0f2f5;
    }

    .upload-box p {
      margin: 10px 0 0;
    }

    input[type="file"] {
      display: none;
    }

    .file-info {
      margin-top: 12px;
      font-size: 14px;
      color: #555;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .progress-wrapper {
      width: 100%;
      height: 18px;
      background: #e1e5ea;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 24px;
      display: none;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #222;
      transition: width 0.25s;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 24px;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: #f4f6f8;
      border-radius: 10px;
      font-size: 15px;
    }

    .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status {
      color: #777;
      flex-shrink: 0;
    }

    .x-icon {
      color: #d11a2a;
      font-weight: bold;
      font-size: 22px;
      flex-shrink: 0;
    }

    .success-icon {
      color: green;
      font-weight: bold;
      font-size: 20px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Minh ngoo Checker</h1>

    <label class="upload-box" for="imageInput">
      <strong>Cho anh vao day</strong>
      <p>1 cai hoac nhieu cai cx dc (y la tung anh 1 nhe)</p>
      <input id="imageInput" type="file" accept="image/*" multiple />
    </label>

    <div id="fileInfo" class="file-info">No files selected</div>

    <button id="sendBtn" disabled>Send</button>

    <div id="progressWrapper" class="progress-wrapper">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <ul id="resultList">
      <li>
        <span class="file-name">No image yet</span>
        <span class="status">no info</span>
      </li>
    </ul>
  </div>

  <script src="client.js"></script>
</body>
</html>
