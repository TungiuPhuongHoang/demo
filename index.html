<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Image Upload Checker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: white;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    .upload-box {
      border: 2px dashed #9aa4b2;
      border-radius: 14px;
      padding: 30px;
      text-align: center;
      background: #fafafa;
      cursor: pointer;
      transition: 0.2s;
    }

    .upload-box:hover {
      border-color: #222;
      background: #f0f2f5;
    }

    input[type="file"] {
      display: none;
    }

    .file-info {
      margin-top: 12px;
      font-size: 14px;
      color: #555;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .progress-wrapper {
      width: 100%;
      height: 18px;
      background: #e1e5ea;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 24px;
      display: none;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #222;
      transition: width 0.25s;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 24px;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: #f4f6f8;
      border-radius: 10px;
      font-size: 15px;
    }

    .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status {
      color: #777;
      flex-shrink: 0;
    }

    .x-icon {
      color: #d11a2a;
      font-weight: bold;
      font-size: 22px;
      flex-shrink: 0;
    }

    .success-icon {
      color: green;
      font-weight: bold;
      font-size: 20px;
      flex-shrink: 0;
    }

    .url-list {
      margin-top: 24px;
    }

    .url-list h3 {
      margin-bottom: 10px;
    }

    .url-list a {
      display: block;
      word-break: break-all;
      margin-bottom: 8px;
      color: #0066cc;
      font-size: 14px;
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Image Upload Checker</h1>

    <label class="upload-box" for="imageInput">
      <strong>Click to upload images</strong>
      <p>You can choose multiple image files</p>
      <input id="imageInput" type="file" accept="image/*" multiple />
    </label>

    <div id="fileInfo" class="file-info">No files selected</div>

    <button id="sendBtn" disabled>Send</button>

    <div id="progressWrapper" class="progress-wrapper">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <ul id="resultList">
      <li>
        <span class="file-name">No image yet</span>
        <span class="status">no info</span>
      </li>
    </ul>

    <div class="url-list">
      <h3>Uploaded URLs</h3>
      <div id="urlList">No uploaded image yet</div>
    </div>

    <p class="note">
      Debug note: uploads are sent to your Vercel backend.
      The ImgBB API key is not stored in this frontend file.
    </p>
  </div>

  <script>

    const imageInput = document.getElementById("imageInput");
    const fileInfo = document.getElementById("fileInfo");
    const sendBtn = document.getElementById("sendBtn");
    const progressWrapper = document.getElementById("progressWrapper");
    const progressBar = document.getElementById("progressBar");
    const resultList = document.getElementById("resultList");
    const urlList = document.getElementById("urlList");

    let selectedFiles = [];

    imageInput.addEventListener("change", () => {
      selectedFiles = Array.from(imageInput.files);

      if (selectedFiles.length === 0) {
        fileInfo.textContent = "No files selected";
        sendBtn.disabled = true;
        renderEmptyList();
        return;
      }

      fileInfo.textContent = `${selectedFiles.length} image(s) selected`;
      sendBtn.disabled = false;

      renderFileList(selectedFiles);
      resetProgress();
      urlList.innerHTML = "No uploaded image yet";
    });

    sendBtn.addEventListener("click", async () => {
      if (selectedFiles.length === 0) return;


      sendBtn.disabled = true;
      progressWrapper.style.display = "block";
      progressBar.style.width = "0%";
      urlList.innerHTML = "";

      const uploadedUrls = [];

      try {
        for (let i = 0; i < selectedFiles.length; i++) {
          const file = selectedFiles[i];

          const formData = new FormData();
          formData.append("image", file);

          const response = await fetch(
            "https://demo-six-lime-21.vercel.app/api/upload",
            {
              method: "POST",
              body: formData
            }
          );

          const result = await response.json();

          if (!result.success) {
            throw new Error(result.error?.message || "ImgBB upload failed");
          }

          const imageUrl = result.data.url;
          uploadedUrls.push(imageUrl);

          addUrlToPage(imageUrl);

          const progress = Math.round(((i + 1) / selectedFiles.length) * 100);
          progressBar.style.width = progress + "%";

          changeItemToX(i);
        }

        console.log("Uploaded image URLs:", uploadedUrls);
      } catch (error) {
        console.error(error);
        alert("Upload failed. Check console for details.");
      }

      sendBtn.disabled = false;
    });

    function renderFileList(files) {
      resultList.innerHTML = "";

      files.forEach((file) => {
        const li = document.createElement("li");

        const fileName = document.createElement("span");
        fileName.className = "file-name";
        fileName.textContent = file.name;

        const status = document.createElement("span");
        status.className = "status";
        status.textContent = "no info";

        li.appendChild(fileName);
        li.appendChild(status);
        resultList.appendChild(li);
      });
    }

    function renderEmptyList() {
      resultList.innerHTML = `
        <li>
          <span class="file-name">No image yet</span>
          <span class="status">no info</span>
        </li>
      `;
    }

    function changeItemToX(index) {
      const item = resultList.children[index];

      if (!item) return;

      const status = item.querySelector(".status");

      if (!status) return;

      status.textContent = "✕";
      status.className = "x-icon";
    }

    function addUrlToPage(url) {
      const link = document.createElement("a");
      link.href = url;
      link.textContent = url;
      link.target = "_blank";

      urlList.appendChild(link);
    }

    function resetProgress() {
      progressWrapper.style.display = "none";
      progressBar.style.width = "0%";
    }
  </script>
</body>
</html>
